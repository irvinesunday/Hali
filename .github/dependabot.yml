version: 2
updates:

  # .NET / NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    target-branch: "develop"
    open-pull-requests-limit: 5
    reviewers:
      - "irvinesunday"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Don't auto-update major versions — review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # npm / React Native dependencies
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    target-branch: "develop"
    open-pull-requests-limit: 5
    reviewers:
      - "irvinesunday"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    target-branch: "develop"
    reviewers:
      - "irvinesunday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"

  # Python scripts
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    reviewers:
      - "irvinesunday"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
