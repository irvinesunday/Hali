name: Deploy

on:
  push:
    branches:
      - main     # → production (requires environment approval)
      - develop  # → staging (automatic)

env:
  DOTNET_VERSION: "10.0.x"
  REGISTRY: ghcr.io
  IMAGE_API:    ghcr.io/${{ github.repository }}/hali-api
  IMAGE_WORKER: ghcr.io/${{ github.repository }}/hali-worker

jobs:

  # ─── Build and push Docker images ─────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api-tag:    ${{ steps.meta-api.outputs.tags }}
      worker-tag: ${{ steps.meta-worker.outputs.tags }}
      sha-tag:    ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — API
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Docker metadata — Worker
        id: meta-worker
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_WORKER }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Hali.Api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Hali.Workers/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}

  # ─── Deploy to staging (automatic on develop merge) ───────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.api.hali.app

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Apply migrations — staging
        run: |
          dotnet tool install --global dotnet-ef
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet restore src/Hali.Api/Hali.Api.csproj
          dotnet ef database update \
            --project src/Hali.Infrastructure \
            --startup-project src/Hali.Api \
            --connection "${{ secrets.STAGING_DATABASE_URL }}"

      - name: Seed taxonomy — staging (idempotent)
        run: |
          PGPASSWORD="${{ secrets.STAGING_DB_PASSWORD }}" psql \
            "${{ secrets.STAGING_DATABASE_URL }}" \
            -f seed_taxonomy_expanded.sql
        continue-on-error: false

      - name: Deploy API to staging
        # Replace this step with your actual deployment command:
        # - kubectl set image deployment/hali-api hali-api=${{ env.IMAGE_API }}:${{ github.sha }}
        # - flyctl deploy --image ${{ env.IMAGE_API }}:${{ github.sha }}
        # - aws ecs update-service ...
        run: |
          echo "Deploying ${{ env.IMAGE_API }}:${{ github.sha }} to staging"
          echo "DEPLOY_COMMAND: replace this with your actual deployment target"

      - name: Smoke test staging
        run: |
          sleep 15
          curl -f https://staging.api.hali.app/health || \
            (echo "Staging health check failed" && exit 1)

      - name: Run smoke test suite against staging
        run: |
          echo "Run a lightweight subset of the vertical slice against staging"
          echo "Add: dotnet test tests/Hali.IntegrationTests/ --filter Category=Smoke"
          echo "     with HALI_API_URL=https://staging.api.hali.app"

  # ─── Deploy to production (requires your manual approval) ─────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    # GitHub Environment "production" has a required reviewer set to you.
    # Go to: Settings → Environments → production → Required reviewers → add yourself
    environment:
      name: production
      url: https://api.hali.app

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Apply migrations — production
        # Migrations run BEFORE the new image is deployed.
        # This ensures the DB is ready before traffic hits new code.
        # All migrations must be backward-compatible with the previous API version.
        run: |
          dotnet tool install --global dotnet-ef
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet restore src/Hali.Api/Hali.Api.csproj
          dotnet ef database update \
            --project src/Hali.Infrastructure \
            --startup-project src/Hali.Api \
            --connection "${{ secrets.PRODUCTION_DATABASE_URL }}"

      - name: Deploy API to production
        run: |
          echo "Deploying ${{ env.IMAGE_API }}:${{ github.sha }} to production"
          echo "DEPLOY_COMMAND: replace this with your actual deployment target"

      - name: Post-deploy health check
        run: |
          sleep 20
          curl -f https://api.hali.app/health || \
            (echo "Production health check FAILED — investigate immediately" && exit 1)

      - name: Notify on success
        if: success()
        run: echo "Production deployment successful — ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "PRODUCTION DEPLOYMENT FAILED"
          echo "SHA: ${{ github.sha }}"
          echo "See rollback runbook: docs/runbooks/migration-rollback.md"
          exit 1
