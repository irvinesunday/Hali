name: Hali CI

on:
  push:
    branches: [main, develop, "session/**", "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "9.0.x"
  POSTGRES_DB: hali_test
  POSTGRES_USER: hali
  POSTGRES_PASSWORD: hali_test_password
  COVERAGE_THRESHOLD: 95

jobs:

  secrets-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  openapi-lint:
    name: OpenAPI Lint (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @stoplight/spectral-cli
      - run: spectral lint 02_openapi.yaml --ruleset .spectral.yaml 2>&1 | tee spectral-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: spectral-lint-report, path: spectral-output.txt }

  solution-check:
    name: Check for .NET Solution
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if find . -name "*.sln" -o -name "*.csproj" 2>/dev/null | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo ".NET solution found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No solution yet - skipping dotnet jobs"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secrets-scan, openapi-lint, solution-check]
    if: needs.solution-check.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: [build, solution-check]
    if: needs.solution-check.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - name: Run unit tests with coverage
        run: |
          dotnet test tests/Hali.Tests.Unit/ \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory ./test-results/unit \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Hali.*]*" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests*]*,[*Migrations*]*" \
            || true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: unit-test-results, path: ./test-results/unit/unit-results.trx }
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: unit-coverage, path: ./**/coverage.cobertura.xml }

  civis-tests:
    name: CIVIS Unit Tests
    runs-on: ubuntu-latest
    needs: [build, solution-check]
    if: needs.solution-check.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - name: Run CIVIS tests
        run: |
          dotnet test tests/Hali.Tests.Unit/ \
            --no-restore --configuration Release \
            --filter "Category=CIVIS" \
            --logger "trx;LogFileName=civis-results.trx" \
            --results-directory ./test-results/civis \
            || true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: civis-test-results, path: ./test-results/civis/civis-results.trx }

  integration-tests:
    name: Integration Tests + Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, civis-tests, solution-check]
    if: needs.solution-check.outputs.exists == 'true'
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: "Host=localhost;Port=5432;Database=hali_test;Username=hali;Password=hali_test_password"
      REDIS_URL: "localhost:6379"
      JWT_SECRET: "ci-test-secret-minimum-32-chars-long"
      JWT_EXPIRY_MINUTES: "60"
      REFRESH_TOKEN_EXPIRY_DAYS: "30"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      GEOCODING_PROVIDER: "nominatim"
      NOMINATIM_BASE_URL: "https://nominatim.openstreetmap.org"
      GEOCODING_USER_AGENT: "HaliCI/1.0 ci@hali.app"
      PUSH_PROVIDER: "expo"
      EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
      AFRICASTALKING_API_KEY: ${{ secrets.AFRICASTALKING_API_KEY }}
      AFRICASTALKING_USERNAME: "sandbox"
      H3_RESOLUTION: "9"
      CIVIS_MIN_UNIQUE_DEVICES: "2"
      CIVIS_JOIN_THRESHOLD: "0.65"
      CIVIS_RESTORATION_RATIO: "0.60"
      CIVIS_MIN_RESTORATION_AFFECTED_VOTES: "2"
      CIVIS_CONTEXT_EDIT_WINDOW_MINUTES: "2"
      CIVIS_WRAB_ROLLING_WINDOW_DAYS: "30"
      CIVIS_ROADS_BASE_FLOOR: "2"
      CIVIS_ROADS_HALF_LIFE_HOURS: "18"
      CIVIS_ROADS_MACF_MIN: "2"
      CIVIS_ROADS_MACF_MAX: "6"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - name: Install EF Core tools
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - run: dotnet restore
      - name: Apply migrations
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update \
            --project src/Hali.Infrastructure \
            --startup-project src/Hali.Api \
            --connection "${{ env.DATABASE_URL }}" \
            || echo "Migration skipped (no migrations yet)"
      - name: Seed taxonomy
        run: |
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql \
            -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} \
            -f seed_taxonomy_expanded.sql \
            || echo "Seed skipped"
      - name: Run integration tests
        run: |
          dotnet test tests/Hali.Tests.Integration/ \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results/integration \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Hali.*]*" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests*]*,[*Migrations*]*" \
            || true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: integration-test-results, path: ./test-results/integration/integration-results.trx }
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: integration-coverage, path: ./**/coverage.cobertura.xml }

  contract-test:
    name: API Contract Test (Dredd)
    runs-on: ubuntu-latest
    needs: [integration-tests, solution-check]
    if: needs.solution-check.outputs.exists == 'true'
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: hali_contract
          POSTGRES_USER: hali
          POSTGRES_PASSWORD: hali_test_password
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      REDIS_URL: "localhost:6379"
      JWT_SECRET: "ci-test-secret-minimum-32-chars-long"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      CIVIS_MIN_UNIQUE_DEVICES: "2"
      CIVIS_JOIN_THRESHOLD: "0.65"
      CIVIS_RESTORATION_RATIO: "0.60"
      CIVIS_MIN_RESTORATION_AFFECTED_VOTES: "2"
      CIVIS_CONTEXT_EDIT_WINDOW_MINUTES: "2"
      CIVIS_WRAB_ROLLING_WINDOW_DAYS: "30"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install EF Core tools
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - run: npm install -g dredd
      - run: dotnet restore
      - name: Apply migrations and seed
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update \
            --project src/Hali.Infrastructure \
            --startup-project src/Hali.Api \
            --connection "${{ env.DATABASE_URL }}" \
            || echo "Migration skipped"
          PGPASSWORD=hali_test_password psql \
            -h localhost -U hali -d hali_contract \
            -f seed_taxonomy_expanded.sql || echo "Seed skipped"
      - name: Start API
        run: |
          dotnet run --project src/Hali.Api/Hali.Api.csproj \
            --urls http://localhost:8080 &
          sleep 15
          curl -f http://localhost:8080/health || echo "API not ready yet"
      - name: Run Dredd contract tests
        run: |
          dredd 02_openapi.yaml http://localhost:8080 \
            --hookfiles=tests/dredd-hooks.js \
            --reporter=junit \
            --output=./test-results/dredd/contract-results.xml \
            || true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: contract-test-results, path: ./test-results/dredd/ }

  coverage-gate:
    name: "Coverage Gate (>=95% required)"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, contract-test, solution-check]
    if: needs.solution-check.outputs.exists == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - name: Install reportgenerator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - uses: actions/download-artifact@v4
        with: { name: unit-coverage, path: ./coverage-raw/unit }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: integration-coverage, path: ./coverage-raw/integration }
        continue-on-error: true
      - name: Check coverage
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          COVERAGE_FILES=$(find ./coverage-raw -name "coverage.cobertura.xml" 2>/dev/null | tr '\n' ';')
          if [ -z "$COVERAGE_FILES" ]; then
            echo "No coverage files yet - skipping gate"
            exit 0
          fi
          reportgenerator \
            -reports:"$COVERAGE_FILES" \
            -targetdir:"./coverage-report" \
            -reporttypes:"Html;Cobertura;MarkdownSummaryGithub;TextSummary" \
            -assemblyfilters:"+Hali.*;-*Tests*;-*Migrations*" \
            -verbosity:Warning
          cat ./coverage-report/Summary.txt || true
          cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY || true
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, sys, os
          cov = './coverage-report/Cobertura.xml'
          if not os.path.exists(cov):
              print("No coverage report yet - skipping")
              sys.exit(0)
          rate = float(ET.parse(cov).getroot().attrib.get('line-rate', 0)) * 100
          print(f"Coverage: {rate:.2f}%")
          if rate > 0 and rate < 95.0:
              print("FAILED: below 95%")
              sys.exit(1)
          print("OK")
          PYEOF
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: coverage-html-report, path: ./coverage-report/ }

  vertical-slice:
    name: Vertical Slice (E2E)
    runs-on: ubuntu-latest
    needs: [coverage-gate, solution-check]
    if: needs.solution-check.outputs.exists == 'true'
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: hali_slice
          POSTGRES_USER: hali
          POSTGRES_PASSWORD: hali_test_password
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      REDIS_URL: "localhost:6379"
      JWT_SECRET: "ci-test-secret-minimum-32-chars-long"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      CIVIS_MIN_UNIQUE_DEVICES: "2"
      CIVIS_JOIN_THRESHOLD: "0.65"
      CIVIS_RESTORATION_RATIO: "0.60"
      CIVIS_MIN_RESTORATION_AFFECTED_VOTES: "2"
      CIVIS_CONTEXT_EDIT_WINDOW_MINUTES: "2"
      CIVIS_WRAB_ROLLING_WINDOW_DAYS: "30"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - name: Install EF Core tools
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - run: dotnet restore
      - name: Apply migrations and seed
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update \
            --project src/Hali.Infrastructure \
            --startup-project src/Hali.Api \
            --connection "${{ env.DATABASE_URL }}" \
            || echo "Migration skipped"
          PGPASSWORD=hali_test_password psql \
            -h localhost -U hali -d hali_slice \
            -f seed_taxonomy_expanded.sql || echo "Seed skipped"
      - name: Start API
        run: |
          dotnet run --project src/Hali.Api/Hali.Api.csproj --urls http://localhost:8080 &
          sleep 15
          curl -f http://localhost:8080/health || echo "API not ready"
      - name: Run vertical slice tests
        run: |
          dotnet test tests/Hali.Tests.Integration/ \
            --no-restore --configuration Release \
            --filter "Category=VerticalSlice" \
            --logger "trx;LogFileName=slice-results.trx" \
            --results-directory ./test-results/slice \
            || true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: vertical-slice-results, path: ./test-results/slice/slice-results.trx }
