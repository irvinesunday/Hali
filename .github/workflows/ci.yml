name: Hali CI

on:
  push:
    branches: [main, develop, "session/**", "feature/**"]
  pull_request:
    branches: [main, develop]

# Default to least-privilege for the GITHUB_TOKEN. Individual jobs that
# write to the API (e.g. coverage-gate posting a PR comment) escalate
# their own permissions explicitly.
permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  POSTGRES_DB: hali_test
  POSTGRES_USER: hali
  POSTGRES_PASSWORD: hali_test_password
  COVERAGE_THRESHOLD: 40

jobs:

  # ─── Job 0a: Secret scanning — runs first, blocks everything on leak ────────
  secrets-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── Job 0b: OpenAPI spec linting ───────────────────────────────────────────
  openapi-lint:
    name: OpenAPI Lint (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli
      - name: Lint OpenAPI spec
        run: spectral lint 02_openapi.yaml --ruleset .spectral.yaml 2>&1 | tee spectral-output.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: spectral-lint-report, path: spectral-output.txt }

  # ─── Job 1: Build (depends on both pre-checks) ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secrets-scan, openapi-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - name: Run unit tests with coverage
        run: |
          dotnet test tests/Hali.Tests.Unit/ \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory ./test-results/unit \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Hali.*]*" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests*]*,[*Migrations*]*"
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: unit-test-results, path: ./test-results/unit/unit-results.trx }
      - uses: actions/upload-artifact@v7
        with: { name: unit-coverage, path: ./**/coverage.cobertura.xml }

  civis-tests:
    name: CIVIS Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - name: Run CIVIS tests
        run: |
          dotnet test tests/Hali.Tests.Unit/ \
            --no-restore --configuration Release \
            --filter "Category=CIVIS" \
            --logger "trx;LogFileName=civis-results.trx" \
            --results-directory ./test-results/civis
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: civis-test-results, path: ./test-results/civis/civis-results.trx }

  # ─── Integration tests ─────────────────────────────────────────────────────
  # Schema is managed by HaliWebApplicationFactory.EnsureSchemaAsync() using
  # idempotent raw SQL — NOT EF migrations. No dotnet-ef step needed.
  integration-tests:
    name: Integration Tests + Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, civis-tests]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      # TestConstants reads these env vars for CI-compatible credentials
      TEST_CONNECTION_STRING: "Host=localhost;Port=5432;Database=hali_test;Username=hali;Password=hali_test_password"
      TEST_MAINTENANCE_CONNECTION_STRING: "Host=localhost;Port=5432;Database=postgres;Username=hali;Password=hali_test_password"
      TEST_REDIS_URL: "localhost:6379"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - name: Run integration tests with coverage
        run: |
          dotnet test tests/Hali.Tests.Integration/ \
            --no-restore --configuration Release \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./test-results/integration \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Hali.*]*" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*Tests*]*,[*Migrations*]*"
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: integration-test-results, path: ./test-results/integration/integration-results.trx }
      - uses: actions/upload-artifact@v7
        with: { name: integration-coverage, path: ./**/coverage.cobertura.xml }

  # ─── Contract test — live API vs OpenAPI spec ──────────────────────────────
  # Uses 01_postgres_schema.sql (raw idempotent SQL) for schema setup.
  # The API is started with dotnet run and does not auto-create tables.
  contract-test:
    name: API Contract Test (Dredd)
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: hali_contract
          POSTGRES_USER: hali
          POSTGRES_PASSWORD: hali_test_password
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      ConnectionStrings__Auth: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      ConnectionStrings__Signals: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      ConnectionStrings__Clusters: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      ConnectionStrings__Participation: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      ConnectionStrings__Advisories: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      ConnectionStrings__Notifications: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      ConnectionStrings__Admin: "Host=localhost;Port=5432;Database=hali_contract;Username=hali;Password=hali_test_password"
      Redis__Url: "localhost:6379"
      Auth__JwtSecret: "ci-test-secret-minimum-32-chars-long"
      Auth__JwtIssuer: "hali"
      Auth__JwtAudience: "hali"
      Auth__JwtExpiryMinutes: "60"
      Auth__RefreshTokenExpiryDays: "30"
      Otp__Length: "6"
      Otp__TtlMinutes: "10"
      Otp__MaxRequestsPerWindow: "100"
      Otp__WindowMinutes: "10"
      Anthropic__ApiKey: ${{ secrets.ANTHROPIC_API_KEY }}
      Anthropic__Model: "claude-sonnet-4-6"
      AfricasTalking__ApiKey: ${{ secrets.AFRICASTALKING_API_KEY }}
      AfricasTalking__Username: "sandbox"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - name: Setup Node for Dredd
        uses: actions/setup-node@v6
        with: { node-version: "22" }
      - run: npm install -g dredd
      - run: dotnet restore
      - name: Create schema and seed
        run: |
          PGPASSWORD=hali_test_password psql \
            -h localhost -U hali -d hali_contract \
            -f 01_postgres_schema.sql
          PGPASSWORD=hali_test_password psql \
            -h localhost -U hali -d hali_contract \
            -f seed_taxonomy_expanded.sql
      - name: Start API
        run: |
          dotnet run --project src/Hali.Api/Hali.Api.csproj \
            --no-restore \
            --urls http://localhost:8080 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            echo "Waiting for API... ($i)"
            sleep 2
          done
          curl -f http://localhost:8080/health
      - name: Run Dredd contract tests
        run: |
          dredd 02_openapi.yaml http://localhost:8080 \
            --hookfiles=tests/dredd-hooks.js \
            --reporter=junit \
            --output=./test-results/dredd/contract-results.xml \
            || true  # Don't fail CI while hooks are being developed
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: contract-test-results, path: ./test-results/dredd/ }

  coverage-gate:
    name: "Coverage Gate"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, contract-test]
    # Needs `pull-requests: write` so the coverage report comment can be
    # posted via github.rest.issues.createComment (PR comments live on the
    # issues API but use the pull-requests scope). `issues: write` is also
    # granted for belt-and-braces compatibility with the issues endpoint.
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - name: Install reportgenerator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - uses: actions/download-artifact@v8
        with: { name: unit-coverage, path: ./coverage-raw/unit }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: integration-coverage, path: ./coverage-raw/integration }
      - name: Merge coverage and generate report
        run: |
          COVERAGE_FILES=$(find ./coverage-raw -name "coverage.cobertura.xml" | tr '\n' ';')
          echo "Files: $COVERAGE_FILES"
          reportgenerator \
            -reports:"$COVERAGE_FILES" \
            -targetdir:"./coverage-report" \
            -reporttypes:"Html;Cobertura;MarkdownSummaryGithub;TextSummary" \
            -assemblyfilters:"+Hali.*;-*Tests*" \
            -classfilters:"-*Migrations*;-*ModelSnapshot*;-*DbContextFactory*" \
            -verbosity:Warning
      - name: Show summary
        run: cat ./coverage-report/Summary.txt
      - name: Publish to job summary
        run: cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
      - name: Enforce coverage threshold
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, sys, os
          tree = ET.parse('./coverage-report/Cobertura.xml')
          rate = float(tree.getroot().attrib.get('line-rate', 0)) * 100
          threshold = float(os.environ.get('COVERAGE_THRESHOLD', '50'))
          print(f"Combined line coverage: {rate:.2f}%")
          if rate < threshold:
              print(f"COVERAGE GATE FAILED: {rate:.2f}% < {threshold}% required")
              sys.exit(1)
          print(f"COVERAGE GATE PASSED: {rate:.2f}% >= {threshold}%")
          PYEOF
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: coverage-html-report, path: ./coverage-report/ }
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const md = fs.readFileSync('./coverage-report/SummaryGithub.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Code Coverage Report\n\n${md}\n\nMinimum required: ${process.env.COVERAGE_THRESHOLD || 40}%`
            });

  vertical-slice:
    name: Vertical Slice (E2E)
    runs-on: ubuntu-latest
    needs: coverage-gate
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: hali_slice
          POSTGRES_USER: hali
          POSTGRES_PASSWORD: hali_test_password
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      ConnectionStrings__Auth: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      ConnectionStrings__Signals: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      ConnectionStrings__Clusters: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      ConnectionStrings__Participation: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      ConnectionStrings__Advisories: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      ConnectionStrings__Notifications: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      ConnectionStrings__Admin: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      Redis__Url: "localhost:6379"
      Auth__JwtSecret: "ci-test-secret-minimum-32-chars-long"
      Auth__JwtIssuer: "hali"
      Auth__JwtAudience: "hali"
      Auth__JwtExpiryMinutes: "60"
      Auth__RefreshTokenExpiryDays: "30"
      Otp__Length: "6"
      Otp__TtlMinutes: "10"
      Otp__MaxRequestsPerWindow: "100"
      Otp__WindowMinutes: "10"
      Anthropic__ApiKey: ${{ secrets.ANTHROPIC_API_KEY }}
      Anthropic__Model: "claude-sonnet-4-6"
      AfricasTalking__ApiKey: ${{ secrets.AFRICASTALKING_API_KEY }}
      AfricasTalking__Username: "sandbox"
      # TestConstants env vars for vertical slice tests that go through the factory
      TEST_CONNECTION_STRING: "Host=localhost;Port=5432;Database=hali_slice;Username=hali;Password=hali_test_password"
      TEST_MAINTENANCE_CONNECTION_STRING: "Host=localhost;Port=5432;Database=postgres;Username=hali;Password=hali_test_password"
      TEST_REDIS_URL: "localhost:6379"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "${{ env.DOTNET_VERSION }}" }
      - run: dotnet restore
      - name: Create schema and seed
        run: |
          PGPASSWORD=hali_test_password psql \
            -h localhost -U hali -d hali_slice \
            -f 01_postgres_schema.sql
          PGPASSWORD=hali_test_password psql \
            -h localhost -U hali -d hali_slice \
            -f seed_taxonomy_expanded.sql
      - name: Start API
        run: |
          dotnet run --project src/Hali.Api/Hali.Api.csproj \
            --no-restore \
            --urls http://localhost:8080 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            echo "Waiting for API... ($i)"
            sleep 2
          done
          curl -f http://localhost:8080/health || (echo "API failed to start" && exit 1)
      - name: Run vertical slice tests
        run: |
          dotnet test tests/Hali.Tests.Integration/ \
            --no-restore --configuration Release \
            --filter "Category=VerticalSlice" \
            --logger "trx;LogFileName=slice-results.trx" \
            --results-directory ./test-results/slice
      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: vertical-slice-results, path: ./test-results/slice/slice-results.trx }
