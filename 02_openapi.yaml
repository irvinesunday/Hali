
openapi: 3.1.0
info:
  title: Hali API
  version: 0.5.0
  summary: Civic signal and official update API for the Hali MVP
  description: |
    Spec repaired against the C# backend source in `src/Hali.Api/Controllers/*`
    and `src/Hali.Contracts/**/*Dto.cs`. JSON convention:
      - Property names: camelCase (System.Text.Json `JsonNamingPolicy.CamelCase`)
      - Enum values: snake_case_lower (`JsonStringEnumConverter` with
        `JsonNamingPolicy.SnakeCaseLower`)
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
  - name: Localities
  - name: Signals
  - name: Clusters
  - name: Participation
  - name: OfficialPosts
  - name: Institution
  - name: Home
  - name: Users
  - name: Devices
  - name: Feedback
  - name: Admin
  - name: FeatureFlags
paths:
  # ── Auth ────────────────────────────────────────────────────────────
  /v1/auth/otp:
    post:
      tags: [Auth]
      summary: Request phone or email OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination, authMethod]
              properties:
                destination: { type: string }
                authMethod:
                  type: string
                  enum: [phone_otp, email_otp, magic_link, google, apple]
                  description: |
                    Serialised from `Hali.Domain.Enums.AuthMethod` via
                    snake_case_lower converter. Phase 1 only uses `phone_otp`.
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OtpRequestedResponse' }
        '429':
          description: OTP rate limited (auth.otp_rate_limited)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/auth/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and return access + refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination, otp, deviceFingerprintHash]
              properties:
                destination: { type: string }
                otp: { type: string }
                deviceFingerprintHash: { type: string }
                platform: { type: string, nullable: true }
                appVersion: { type: string, nullable: true }
                expoPushToken: { type: string, nullable: true }
      responses:
        '200':
          description: Verified — returns JWT access token and refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid or expired OTP (auth.otp_invalid)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange refresh token for new token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid or expired refresh token (auth.refresh_token_invalid)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '204':
          description: Logged out
  /v1/auth/institution/setup:
    post:
      tags: [Auth]
      summary: Accept institution invite and register phone number
      description: |
        Validates the invite token, creates an institution account (or upgrades an existing
        citizen account), and sends an OTP to the provided phone number. The representative
        then verifies via the standard POST /v1/auth/verify endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteToken, phoneNumber]
              properties:
                inviteToken: { type: string }
                phoneNumber: { type: string }
      responses:
        '202': { description: OTP sent to phone }
        '400':
          description: Invalid or expired invite (invite.invalid, invite.expired)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: Invite already accepted (invite.already_accepted)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: OTP rate limited (auth.otp_rate_limited)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Institution Auth + Session (Phase 2) ────────────────────────────
  #
  # All /v1/auth/institution/* endpoints issue or consume the
  # `hali_institution_session` (httpOnly + Secure + SameSite=Strict)
  # cookie and its paired `hali_institution_csrf` cookie. Writes on
  # authenticated endpoints require an `X-CSRF-Token` header that
  # matches the CSRF cookie (double-submit pattern). Server enforces
  # idle + absolute session timeouts (30 min idle, 12 h absolute) and
  # step-up auth for privileged actions.

  /v1/auth/institution/magic-link/request:
    post:
      tags: [Auth]
      summary: Request a magic-link email for institution login
      description: |
        Responds identically for registered and unknown emails to avoid
        account enumeration. The link is single-use and expires after
        15 minutes.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MagicLinkRequest' }
      responses:
        '200':
          description: Response is identical regardless of email registration.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MagicLinkRequestResponse' }
        '400':
          description: Validation failed (validation.failed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/auth/institution/magic-link/verify:
    post:
      tags: [Auth]
      summary: Consume magic-link token → establish institution session
      description: |
        Atomically consumes the token and — when the token resolves to an
        institution account — issues the session + CSRF cookies. The
        response body tells the client whether TOTP enrollment or
        verification is still required before the session is treated
        as fully authenticated.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MagicLinkVerifyRequest' }
      responses:
        '200':
          description: Session established. Cookies are set on the response.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MagicLinkVerifyResponse' }
        '401':
          description: Invalid / expired / already-consumed token (auth.magic_link_invalid)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/auth/institution/totp/enroll:
    post:
      tags: [Auth]
      summary: Begin TOTP enrollment for the current institution session
      security:
        - institutionSessionAuth: []
      responses:
        '200':
          description: Returns the otpauth URI + 10 recovery codes.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TotpEnrollResponse' }
        '401':
          description: Institution session invalid / idle-timed-out / absolute-timed-out.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: CSRF header missing or mismatched (auth.csrf_missing, auth.csrf_mismatch)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: Account already has a confirmed TOTP enrollment (auth.totp_already_enrolled)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/auth/institution/totp/confirm:
    post:
      tags: [Auth]
      summary: Confirm the pending TOTP enrollment (first successful code)
      security:
        - institutionSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TotpCodeRequest' }
      responses:
        '200':
          description: TOTP confirmed; step-up verified-at is stamped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StepUpResponse' }
        '400':
          description: Invalid TOTP code (auth.totp_invalid_code)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: No pending TOTP enrollment on the account (auth.totp_not_enrolled)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/auth/institution/totp/verify:
    post:
      tags: [Auth]
      summary: Verify TOTP code (promotes a magic-link session to fully-authenticated)
      security:
        - institutionSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TotpCodeRequest' }
      responses:
        '200':
          description: TOTP verified; session step-up stamped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StepUpResponse' }
        '400':
          description: Invalid TOTP code (auth.totp_invalid_code)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: TOTP not yet enrolled or not confirmed (auth.totp_not_confirmed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/auth/institution/session/refresh:
    post:
      tags: [Auth]
      summary: Keep-alive the current institution session
      description: |
        Resets the idle timer server-side. The response echoes the fresh
        last-activity timestamp + the idle / soft-warning thresholds in
        seconds so the client's "session about to end" banner can reset
        without a second round-trip.
      security:
        - institutionSessionAuth: []
      responses:
        '200':
          description: Session kept alive.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionRefreshedResponse' }
        '401':
          description: Session idle-timed-out or absolute-timed-out.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: CSRF header missing or mismatched.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/auth/institution/session/step-up:
    post:
      tags: [Auth]
      summary: Fresh TOTP verification for a privileged action
      description: |
        Consumers (e.g. institution-admin writes) require the session's
        `step_up_verified_at` to be within the configured 5-minute
        window. This endpoint re-stamps it after a successful TOTP code.
      security:
        - institutionSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TotpCodeRequest' }
      responses:
        '200':
          description: Step-up verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StepUpResponse' }
        '400':
          description: Invalid TOTP code (auth.totp_invalid_code)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: TOTP not enrolled / not confirmed (auth.totp_not_confirmed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/auth/institution/session/logout:
    post:
      tags: [Auth]
      summary: Revoke the current institution session and clear cookies
      security:
        - institutionSessionAuth: []
      responses:
        '204':
          description: Session revoked; cookies cleared.
        '401':
          description: No session to revoke.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Localities ──────────────────────────────────────────────────────
  /v1/localities/followed:
    get:
      tags: [Localities]
      summary: List current user's followed wards (with display names)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [localityId, displayLabel, wardName, cityName]
                  properties:
                    localityId: { type: string, format: uuid }
                    displayLabel:
                      type: string
                      nullable: true
                      description: User-chosen area/estate name (e.g. "South B"). May be null for follows that predate this column — UI falls back to wardName.
                    wardName: { type: string }
                    cityName:
                      type: string
                      nullable: true
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    put:
      tags: [Localities]
      summary: Set followed wards (max 5)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Send `items` (preferred — carries displayLabel for each follow).
                Legacy `localityIds` is still accepted for backwards compatibility
                but does not capture display labels.
              properties:
                items:
                  type: array
                  maxItems: 5
                  items:
                    type: object
                    required: [localityId]
                    properties:
                      localityId: { type: string, format: uuid }
                      displayLabel:
                        type: string
                        nullable: true
                        maxLength: 160
                localityIds:
                  type: array
                  deprecated: true
                  items: { type: string, format: uuid }
                  maxItems: 5
      responses:
        '204': { description: Updated }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: max_followed_localities_exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/localities/wards:
    get:
      tags: [Localities]
      summary: List every ward/locality in the system (canonical list)
      description: |
        Returns the full, alphabetically sorted list of wards/localities
        known to the platform. Intended for the mobile client to cache
        locally and run client-side search/filter against — avoiding a
        geocoding round-trip per keystroke and enabling a "browse all"
        UX.

        Response is cached in Redis for 24 hours (the underlying ward
        geometry changes only on explicit import). Anonymous endpoint.
      security: []
      responses:
        '200':
          description: Canonical ward list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LocalitySummary' }

  /v1/localities/search:
    get:
      tags: [Localities]
      summary: Search for an area / estate by free text (Nominatim + PostGIS ward resolution)
      description: |
        Forward-geocodes the query via Nominatim (biased to Kenya), then resolves
        each candidate to a Hali locality via PostGIS point-in-polygon. Returns
        up to 5 matches. Candidates outside any covered locality are skipped.
        Results are cached in Redis for 1 hour. Anonymous endpoint.
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: Candidate localities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [localityId, placeLabel, wardName, cityName]
                  properties:
                    localityId: { type: string, format: uuid }
                    placeLabel:
                      type: string
                      description: Human-readable label from Nominatim (e.g. "South B, Nairobi"). Use this as displayLabel when following.
                    wardName: { type: string }
                    cityName:
                      type: string
                      nullable: true
        '400':
          description: Query too short or too long (locality.query_too_short, locality.query_too_long)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: Rate limit exceeded (locality.search_rate_limited)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/localities/resolve-by-coordinates:
    get:
      tags: [Localities]
      summary: Resolve GPS coordinates to nearest ward — GPS opt-in only (public)
      description: |
        NOT called by default. Only called when the user explicitly opts in to
        GPS-based locality detection. The default first-launch flow uses
        /v1/localities/search (manual area picker).
      security: []
      parameters:
        - name: latitude
          in: query
          required: true
          schema: { type: number, format: double }
        - name: longitude
          in: query
          required: true
          schema: { type: number, format: double }
      responses:
        '200':
          description: Nearest matched locality
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocalitySummary' }
        '400':
          description: Coordinates out of range (locality.invalid_coordinates)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: No locality found for coordinates (locality.not_found)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Places (C11 low-confidence location fallback) ──────────────────
  /v1/places/search:
    get:
      tags: [Places]
      summary: Search for a place (road / landmark / area) by free text — composer fallback
      description: |
        Forward-geocodes the query via Nominatim (biased to Kenya), then resolves
        each candidate to a Hali locality via PostGIS point-in-polygon. Returns
        up to 5 matches, each with coordinates and resolved ward context.
        Candidates outside any covered locality are filtered out — every
        returned candidate is a valid submit target. Anonymous, rate-limited
        per client IP, Redis-cached (1h).
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 80
      responses:
        '200':
          description: Candidate places (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PlaceCandidate' }
        '400':
          description: Query too short or too long
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/places/reverse:
    get:
      tags: [Places]
      summary: Reverse geocode coordinates to a single place candidate — composer fallback
      description: |
        Reverse-geocodes the coordinate via Nominatim and resolves it to a
        Hali locality. Used by the composer's "Use my current location"
        action in the low-confidence fallback flow. Returns 404 when the
        coordinates are outside any known locality. Anonymous, rate-limited,
        Redis-cached (1d).
      security: []
      parameters:
        - name: latitude
          in: query
          required: true
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
        - name: longitude
          in: query
          required: true
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
      responses:
        '200':
          description: Resolved place candidate
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlaceCandidate' }
        '400':
          description: Invalid coordinates
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: No locality found for the given coordinates
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/feedback:
    post:
      tags: [Feedback]
      summary: Submit anonymous in-app feedback (public)
      description: |
        No auth required. Returns 202 immediately — fire and forget from client.
        account_id captured server-side if request is authenticated, otherwise null.
        Text capped at 300 chars server-side regardless of client input.

        Rate-limited via the canonical Redis limiter (#169 / R4). Authenticated
        callers are throttled per-account; anonymous callers fall back to a
        per-IP bucket. Over-cap submissions return 429 with
        `error.code = rate_limit.exceeded` on the canonical error envelope.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '202': { description: Feedback received }
        '429':
          description: Rate limit exceeded (per-account for authenticated callers, per-IP for anonymous)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Signals ─────────────────────────────────────────────────────────
  /v1/signals/preview:
    post:
      tags: [Signals]
      summary: NLP-first preview — extracts a structured civic signal candidate
      description: |
        Returns a single structured extraction from free text, including the
        canonical category/subcategory and a resolved location object. Anonymous
        callers are rate-limited to 10 requests per IP per 10 minutes (Redis-
        backed).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalPreviewRequest'
      responses:
        '200':
          description: Preview result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalPreviewResponse'
        '400':
          description: free_text is required
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: NLP returned an unrecognised category
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: Rate limited (anonymous IP cap)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '502':
          description: NLP extraction service unavailable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/signals/submit:
    post:
      tags: [Signals]
      summary: Submit a civic signal event after preview confirmation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignalSubmitRequest'
      responses:
        '200':
          description: Submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalSubmitResponse'
        '400':
          description: idempotency_key or device_hash missing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: Signal already submitted with this idempotency key
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: Invalid category
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: Too many signals submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Clusters ────────────────────────────────────────────────────────
  /v1/clusters/{id}:
    get:
      tags: [Clusters]
      summary: Get cluster detail with official updates side by side
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterResponse'
        '404':
          description: Cluster not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/clusters/{id}/participation:
    post:
      tags: [Participation]
      summary: Add Affected, Observing, or No Longer Affected participation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipationRequest'
      responses:
        '204': { description: Recorded }
        '400':
          description: device_hash or type missing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: invalid_participation_type or device_not_found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/clusters/{id}/context:
    post:
      tags: [Participation]
      summary: Add further context (requires prior "affected" participation)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextRequest'
      responses:
        '204': { description: Recorded }
        '400':
          description: device_hash or text missing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: |
            One of:
              - device_not_found
              - policy_blocked (reason=context_requires_affected_participation)
              - policy_blocked (reason=context_edit_window_expired)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/clusters/{id}/restoration-response:
    post:
      tags: [Participation]
      summary: Cast a restoration vote (still_affected / restored / not_sure)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestorationResponseRequest'
      responses:
        '204': { description: Recorded }
        '400':
          description: device_hash missing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: |
            One of:
              - invalid_restoration_response
              - device_not_found
              - policy_blocked (reason=restoration_requires_affected_participation)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Institution Official Updates ───────────────────────────────────
  #
  # Legacy path `/v1/official-posts` was renamed to
  # `/v1/institution/official-updates` in Phase 4 to align with
  # `docs/arch/02_api_contracts.md`. Internal C# class names (e.g.
  # `OfficialPostsController`, `OfficialPostCreateRequestDto`) retain
  # the older "official-post" naming; only the wire path changed.
  /v1/institution/official-updates:
    post:
      tags: [OfficialPosts]
      summary: Create geo-scoped institution official update (requires role=institution)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficialPostCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfficialPostResponse'
        '400':
          description: |
            Missing fields (official_post.missing_fields),
            invalid post type (official_post.invalid_type),
            invalid category (official_post.invalid_category),
            invalid response_status (official_post.invalid_response_status),
            or invalid severity (official_post.invalid_severity).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Authenticated caller does not hold the institution role
            (auth.role_insufficient), is outside the institution's
            jurisdiction (official_post.outside_jurisdiction), or is
            missing/has a malformed institution_id claim on the JWT
            (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Institution Operational (Phase 2) ──────────────────────────────
  #
  # All `/v1/institution/*` routes require a JWT with `role=institution`
  # and an `institution_id` claim. The institution id is resolved from
  # the JWT claim server-side — never from a query parameter or route
  # segment. Area filtering, when supplied, is validated against the
  # caller's jurisdiction server-side. List endpoints use the cursor
  # pagination contract documented in
  # `docs/arch/hali_institution_backend_contract_implications.md §5`.

  /v1/institution/overview:
    get:
      tags: [Institution]
      summary: Institution dashboard summary + area roll-up
      description: |
        Returns scoped summary counts (active, growing, updates-posted-
        today, stabilised-today) and the top-ranked areas in the
        caller's institution scope. Area list is capped at 6 rows for
        the Overview page; the full list is served by
        `GET /v1/institution/areas`.
      security:
        - bearerAuth: []
      parameters:
        - name: areaId
          in: query
          required: false
          description: |
            Optional jurisdiction id to narrow the summary to one area.
            Out-of-scope or unknown ids return a zero-scoped summary
            (not a 403) to avoid revealing scope shape.
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Overview payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionOverviewResponse'
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution/clusters:
    get:
      tags: [Institution]
      summary: Paginated cluster list in institution scope
      security:
        - bearerAuth: []
      parameters:
        - name: areaId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [active, growing, needs_attention, restoration]
        - name: cursor
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Signals page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionSignalsResponse'
        '400':
          description: |
            Invalid `state` filter value
            (institution.invalid_state_filter).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution/clusters/{clusterId}:
    get:
      tags: [Institution]
      summary: Cluster detail (institution-scoped)
      description: |
        Returns the cluster detail shape as `/v1/clusters/{id}`, gated
        by the caller's institution role AND bounded to clusters in
        the caller's jurisdiction. Out-of-scope clusters return 404
        (not 403) so an attacker cannot probe for cluster ids owned
        by another institution.
      security:
        - bearerAuth: []
      parameters:
        - name: clusterId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Cluster detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClusterResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: |
            Cluster not found OR cluster exists but is outside the
            caller's jurisdiction (cluster.not_found).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution/clusters/{clusterId}/acknowledge:
    post:
      tags: [Institution]
      summary: Record an explicit institution acknowledgement on a cluster
      description: |
        Records an explicit acknowledge action by an institution operator
        on a cluster in scope. Emits an `institution.action.recorded`
        outbox event. Passive view tracking
        (`institution.cluster.viewed`) is intentionally deferred; this
        endpoint only records explicit operator intent. The action is
        idempotent: resubmitting with the same `idempotencyKey` returns
        the existing acknowledgement without emitting a duplicate event.
      security:
        - bearerAuth: []
      parameters:
        - name: clusterId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idempotencyKey]
              properties:
                idempotencyKey:
                  type: string
                  format: uuid
                  description: |
                    Client-generated idempotency key. Re-submission
                    with the same key returns the existing record.
                note:
                  type: string
                  maxLength: 500
                  description: Optional internal note captured on the acknowledgement.
      responses:
        '202':
          description: Acknowledgement recorded (or idempotent replay)
          content:
            application/json:
              schema:
                type: object
                required: [acknowledgementId, clusterId, recordedAt]
                properties:
                  acknowledgementId: { type: string, format: uuid }
                  clusterId: { type: string, format: uuid }
                  recordedAt: { type: string, format: date-time }
        '400':
          description: |
            `idempotencyKey` is missing or blank
            (institution.acknowledge_missing_idempotency_key).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: |
            Cluster does not exist, or exists but is outside the
            caller's jurisdiction — returned as 404 (not 403) to
            deny cross-institution existence probes
            (institution.acknowledge_out_of_scope).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution/restoration:
    get:
      tags: [Institution]
      summary: Restoration queue — clusters in possible_restoration within scope
      description: |
        Returns the list of clusters currently in `possible_restoration`
        state within the caller's jurisdiction, enriched with live
        restoration vote counts (from the same `RestorationCountSnapshot`
        the lifecycle engine evaluates). Ordered ascending by
        `possible_restoration_at` so the longest-sitting clusters surface
        first. The queue is returned unpaginated — typical depth is small
        enough that cursor pagination is not required.
      security:
        - bearerAuth: []
      parameters:
        - name: areaId
          in: query
          required: false
          description: Optional jurisdiction filter — scopes the queue to a single institution area.
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Restoration queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionRestorationQueueResponse'
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution/areas:
    get:
      tags: [Institution]
      summary: Full institution area list
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Areas list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstitutionAreasResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution/activity:
    get:
      tags: [Institution]
      summary: Activity feed for institution scope
      description: |
        Returns recent cluster lifecycle events and institution-posted
        official updates in reverse-chronological order. Default page
        size is 15; max 100. Supply `cursor` to fetch the next page.
      security:
        - bearerAuth: []
      parameters:
        - name: areaId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
      responses:
        '200':
          description: Activity page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstitutionActivityResponse'
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Institution Admin (Phase 2) ────────────────────────────────────
  #
  # All /v1/institution-admin/* routes require a JWT or institution
  # session that carries role=institution_admin. Write endpoints
  # (invite, role-change) additionally enforce step-up auth — the
  # session's step_up_verified_at must be within the configured window
  # (default 5 minutes). Bearer-JWT callers cannot satisfy step-up
  # (it lives under the cookie / TOTP surface) and receive
  # auth.step_up_required on writes.

  /v1/institution-admin/users:
    get:
      tags: [Admin]
      summary: List users in the acting admin's institution
      security:
        - institutionSessionAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstitutionAdminUserListResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Caller is missing the institution_admin role
            (auth.role_insufficient) or has a missing/malformed
            institution_id claim (auth.institution_id_missing).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution-admin/users/{userId}:
    get:
      tags: [Admin]
      summary: Get a user's detail (scoped to the acting admin's institution)
      security:
        - institutionSessionAuth: []
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstitutionAdminUserDetailResponse' }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Caller lacks institution_admin role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: |
            User not found or belongs to a different institution
            (institution_admin.user_not_found — 404 is deliberate to
            prevent cross-institution existence probes).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution-admin/users/invite:
    post:
      tags: [Admin]
      summary: Invite a new institution user
      description: |
        Write endpoint — requires step-up auth within the configured
        window. Invite-time elevation to institution_admin is blocked
        (institution_admin.elevation_requires_approval); supply
        role=institution_user and promote later via PUT /role once
        the approval flow lands.
      security:
        - institutionSessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InviteInstitutionUserRequest' }
      responses:
        '200':
          description: Invite issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InviteInstitutionUserResponse' }
        '400':
          description: |
            Request validation failed (validation.failed) — missing or
            malformed `email` / `role`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Missing institution_admin role (auth.role_insufficient),
            step-up required (auth.step_up_required), CSRF missing /
            mismatch (auth.csrf_missing / auth.csrf_mismatch), or
            elevation requested without approval
            (institution_admin.elevation_requires_approval).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: |
            Email already bound to an existing account
            (institution_admin.email_already_in_use).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution-admin/users/{userId}/role:
    put:
      tags: [Admin]
      summary: Change a user's role (demote admin → user only)
      description: |
        Write endpoint — requires step-up auth. Elevation to
        institution_admin is blocked; demotion to institution_user is
        allowed except when the target is the last remaining admin
        (institution_admin.last_admin_cannot_demote).
      security:
        - institutionSessionAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeUserRoleRequest' }
      responses:
        '204':
          description: Role changed
        '400':
          description: Validation failure (validation.failed)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Missing institution_admin role, step-up required, CSRF
            missing / mismatch, or elevation requested
            (institution_admin.elevation_requires_approval).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: |
            User not found or belongs to a different institution
            (institution_admin.user_not_found).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: |
            Target is the last institution_admin in the institution
            (institution_admin.last_admin_cannot_demote).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /v1/institution-admin/scope:
    get:
      tags: [Admin]
      summary: Get the acting admin's institution + jurisdiction scope
      security:
        - institutionSessionAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Scope payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstitutionAdminScopeResponse' }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Missing institution_admin role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Home Feed ───────────────────────────────────────────────────────
  /v1/home:
    get:
      tags: [Home]
      summary: Get paginated home feed
      description: |
        Returns four sections. Without `section` or `cursor`, returns first page of all sections.
        Section limits: active_now=20, official_updates=5, recurring_at_this_time=10, other_active_signals=10.
        First page (authenticated with non-empty follows) is cached in Redis for 30 seconds.
        Subsequent pages are fetched live (no cache).
      security: []
      parameters:
        - name: section
          in: query
          required: false
          schema:
            type: string
            enum: [active_now, official_updates, recurring_at_this_time, other_active_signals]
          description: When set, returns only this section (paginated)
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from a previous response's nextCursor
        - name: localityId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            When provided, scopes the feed to a single locality.
            When absent, the backend derives scope from the authenticated user's
            followed localities (or returns empty sections for unauthenticated users).
            Combines with section and cursor — locality scoping applies regardless.
      responses:
        '200':
          description: |
            Without `section`: returns HomeResponse (all four sections).
            With `section`: returns the matching typed PagedSection directly
            (ClusterPagedSection or OfficialPostPagedSection).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HomeResponse'
                  - $ref: '#/components/schemas/ClusterPagedSection'
                  - $ref: '#/components/schemas/OfficialPostPagedSection'
        '400':
          description: Unknown section name
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Users ───────────────────────────────────────────────────────────
  /v1/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Account not found (account.not_found)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/users/me/notification-settings:
    put:
      tags: [Users]
      summary: Update notification preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSettings'
      responses:
        '204': { description: Updated }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Account not found (account.not_found)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Devices ─────────────────────────────────────────────────────────
  /v1/devices/push-token:
    post:
      tags: [Devices]
      summary: Register or update Expo push token for a device
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceHash, expoPushToken]
              properties:
                deviceHash: { type: string }
                expoPushToken: { type: string }
      responses:
        '204': { description: Updated }
        '400':
          description: device_hash or expo_push_token missing (device.missing_fields)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: |
            Device not recognised (device.not_found). Previously 422 —
            re-typed as NotFound (H2) since "no matching device" is
            semantically a missing resource.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Feature flags ───────────────────────────────────────────────────
  /v1/feature-flags:
    get:
      tags: [FeatureFlags]
      summary: Resolved client-visible feature flags for the current context
      description: |
        Returns the resolved value for every flag in the backend registry
        that is marked `client_visible`. Server-only flags are never
        returned regardless of the caller's role. Anonymous callers are
        supported — their resolved values use `actor_type = "anonymous"`.

        The response shape is a flat `flags` object keyed by flag name.
        Clients do not see the flag's kind, owner, targeting rules, or
        rollout metadata — just the resolved boolean value. See
        `docs/arch/FEATURE_FLIGHTING_MODEL.md` §4.
      security: []
      parameters:
        - in: query
          name: localityId
          schema: { type: string, format: uuid }
          required: false
          description: Optional locality id for locality-scoped rule evaluation.
      responses:
        '200':
          description: Resolved flags for the current request context.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResolvedFeatureFlagsResponse' }
        '400':
          description: |
            Query parameter validation failure — e.g. `localityId` is not
            a valid UUID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ── Admin ───────────────────────────────────────────────────────────
  /v1/admin/institutions:
    post:
      tags: [Admin]
      summary: Create institution and issue invite link
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, jurisdictionLocalityIds]
              properties:
                name: { type: string }
                jurisdictionLocalityIds:
                  type: array
                  items: { type: string, format: uuid }
                contactEmail: { type: string, format: email, nullable: true }
      responses:
        '201':
          description: Institution created with invite link
          content:
            application/json:
              schema:
                type: object
                required: [institutionId, inviteLink, inviteExpiresAt]
                properties:
                  institutionId: { type: string, format: uuid }
                  inviteLink: { type: string, format: uri }
                  inviteExpiresAt: { type: string, format: date-time }
        '400':
          description: name is required
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Authenticated caller does not hold the admin role
            (auth.role_insufficient).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /v1/admin/institutions/{id}/access:
    delete:
      tags: [Admin]
      summary: Revoke all institution account access
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Access revoked
          content:
            application/json:
              schema:
                type: object
                description: Empty object on success.
        '401':
          description: Unauthenticated (auth.unauthenticated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: |
            Authenticated caller does not hold the admin role
            (auth.role_insufficient).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT claims:
          - sub (account UUID)
          - role (citizen | institution | admin)
          - institution_id (UUID, present only for institution accounts)
          - jti, iat (standard)
    institutionSessionAuth:
      type: apiKey
      in: cookie
      name: hali_institution_session
      description: |
        Server-side web session for institution + institution-admin users.
        Set by POST /v1/auth/institution/magic-link/verify and cleared by
        POST /v1/auth/institution/session/logout. Cookie is httpOnly +
        Secure + SameSite=Strict. A paired `hali_institution_csrf` cookie
        is set alongside for the double-submit CSRF check — write verbs
        require its value to be mirrored in the `X-CSRF-Token` header.
  schemas:
    CivicCategory:
      type: string
      enum:
        - roads
        - transport
        - electricity
        - water
        - environment
        - safety
        - governance
        - infrastructure
    ResolvedFeatureFlagsResponse:
      type: object
      required: [flags]
      properties:
        flags:
          type: object
          description: |
            Flat map from flag name (dot-delimited snake_case, e.g.
            `mobile.home.condition_badge.enabled`) to the resolved boolean
            value for the current request context.
          additionalProperties:
            type: boolean

    FeedbackRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: string
          enum: [positive, neutral, negative]
        text: { type: string, maxLength: 300, nullable: true }
        screen:
          type: string
          nullable: true
          enum: [home, detail, composer_step1, composer_step2, composer_step3, areas, profile, notification_settings]
        clusterId: { type: string, format: uuid, nullable: true }
        appVersion: { type: string, nullable: true }
        platform: { type: string, enum: [ios, android], nullable: true }
        sessionId: { type: string, format: uuid, nullable: true }

    ErrorCode:
      type: string
      description: |
        Stable, programmatic identifier for an application-level error
        condition emitted by the Hali API. Codes follow the
        `namespace.reason` snake_case convention (e.g. `auth.otp_invalid`,
        `validation.locality_unresolved`, `signal.duplicate`).

        The canonical source of truth on the server is
        `Hali.Application.Errors.ErrorCodes`; this enum is the wire-visible
        subset. Internal-only codes used for log/trace correlation (e.g.
        `clustering.no_spatial_cell`) are redacted to
        `server.internal_error` by the exception mapper and are NOT listed
        here.

        Client applications should treat an unknown code as equivalent to
        `server.internal_error` for UX fallback purposes, but log the
        received code verbatim for forward-compatible debugging.

        Drift between this enum and the server-side catalog is enforced by
        a unit test (`ErrorCodeCatalogTests`).
      enum:
        - account.not_found
        - auth.csrf_missing
        - auth.csrf_mismatch
        - auth.forbidden
        - auth.institution_id_missing
        - auth.institution_session_absolute_timeout
        - auth.institution_session_idle_timeout
        - auth.institution_session_invalid
        - auth.magic_link_invalid
        - auth.otp_invalid
        - auth.otp_rate_limited
        - auth.refresh_token_invalid
        - auth.role_insufficient
        - auth.step_up_required
        - auth.totp_already_enrolled
        - auth.totp_invalid_code
        - auth.totp_not_confirmed
        - auth.totp_not_enrolled
        - auth.unauthenticated
        - auth.unauthorized
        - cluster.not_found
        - dependency.nlp_unavailable
        - dependency.spatial_derivation_failed
        - device.missing_fields
        - device.not_found
        - institution.acknowledge_missing_idempotency_key
        - institution.acknowledge_out_of_scope
        - institution.invalid_state_filter
        - institution.missing_fields
        - institution_admin.elevation_requires_approval
        - institution_admin.email_already_in_use
        - institution_admin.institution_not_found
        - institution_admin.last_admin_cannot_demote
        - institution_admin.user_not_found
        - invite.already_accepted
        - invite.expired
        - invite.invalid
        - locality.not_found
        - locality.query_too_long
        - locality.query_too_short
        - locality.search_rate_limited
        - official_post.invalid_category
        - official_post.invalid_response_status
        - official_post.invalid_severity
        - official_post.invalid_type
        - official_post.missing_fields
        - official_post.outside_jurisdiction
        - participation.context_requires_affected
        - participation.context_window_expired
        - participation.restoration_requires_affected
        - places.query_too_long
        - places.query_too_short
        - places.reverse_rate_limited
        - places.search_rate_limited
        - rate_limit.exceeded
        - server.internal_error
        - signal.duplicate
        - validation.device_not_found
        - validation.failed
        - validation.invalid_category
        - validation.invalid_coordinates
        - validation.invalid_location_source
        - validation.invalid_participation_type
        - validation.invalid_restoration_response
        - validation.invalid_section
        - validation.locality_unresolved
        - validation.location_label_required
        - validation.location_label_too_long
        - validation.max_followed_localities_exceeded
        - validation.missing_coordinates
        - validation.missing_field

    ErrorResponse:
      type: object
      description: |
        Canonical error envelope emitted by the API's centralized exception
        middleware (H1) and referenced by most documented application-level
        error responses in this spec. A small number of legacy endpoints
        still document body-less 4xx responses; those are tracked for
        migration but are intentionally not referenced to this schema.

        Framework-generated `401` responses from the JwtBearer challenge
        (missing/invalid/expired token on an `[Authorize]` endpoint) also
        emit this envelope, with `code = "auth.unauthenticated"` distinct
        from the application-layer `auth.unauthorized` thrown by controllers
        when a token is valid but an expected claim is missing.
        Framework-generated `403` responses from role/policy denial emit
        this envelope with `code = "auth.role_insufficient"` (see
        `OnForbidden` handler in `Program.cs`). Documented `403` entries
        that reference this schema from controller logic describe failures
        surfaced as typed `ForbiddenException` (`auth.forbidden`).

          * `error.code` — stable `ErrorCode` identifier for programmatic
            handling (see the named `ErrorCode` enum schema for the full
            published set).
          * `error.message` — short human-readable summary safe to surface
            in UI. Not localized; treat wording as unstable between versions.
          * `error.details` — optional. When present on 400 responses it
            carries `{ fields: { fieldName: ["error msg", ...] } }` for
            per-field validation errors. Other codes may include additional
            structured metadata.
          * `error.traceId` — sanitized correlation ID for support/log
            correlation. Not a security boundary.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, traceId]
          properties:
            code: { $ref: '#/components/schemas/ErrorCode' }
            message: { type: string }
            details: { type: object, nullable: true, additionalProperties: true }
            traceId: { type: string }

    OtpRequestedResponse:
      type: object
      description: |
        Success body for POST /v1/auth/otp. The `message` field is a short
        human-readable status; clients should not depend on its exact wording.
      required: [message]
      properties:
        message: { type: string, example: "OTP sent" }

    LocalitySummary:
      type: object
      description: |
        Minimal ward/locality summary. Used both by the canonical ward list
        and by single-ward coordinate-resolution responses. Mirrors
        `Hali.Contracts.Notifications.LocalitySummaryDto`.
      required: [localityId, wardName, cityName]
      properties:
        localityId: { type: string, format: uuid }
        wardName: { type: string }
        cityName: { type: string, nullable: true }

    TokenResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, description: Access token TTL in seconds }

    # ── Signals ──────────────────────────────────────────────────────
    SignalPreviewRequest:
      type: object
      required: [freeText]
      description: |
        Mirrors `Hali.Contracts.Signals.SignalPreviewRequestDto`. Location
        signals are passed as flat fields, not a nested object.
      properties:
        freeText: { type: string, maxLength: 500 }
        userLatitude: { type: number, nullable: true }
        userLongitude: { type: number, nullable: true }
        selectedWard: { type: string, nullable: true }
        locale: { type: string, nullable: true, example: en }
        knownCity: { type: string, nullable: true }
        countryCode: { type: string, nullable: true, example: KE }
    LocationSource:
      type: string
      description: |
        Canonical wire values for `SignalLocation.locationSource` and
        `SignalSubmitRequest.locationSource`. Mirrors
        `Hali.Contracts.Signals.LocationSource`.

          * `nlp` — derived from CSI-NLP extraction, unchanged by the user.
          * `user_edit` — user accepted or edited the human-readable label;
            coordinates remain device-GPS or NLP-suggested.
          * `place_search` — user picked a Nominatim-backed place from the
            C11 low-confidence fallback picker (search results OR
            `Use my current location`). Both label and coordinates are
            authoritative from the picker.
          * `map_pin` — user refined location by dropping / dragging a
            marker on the map fallback surface (C11.1). Coordinates come
            from the marker position; the label is reverse-geocoded on
            marker release via `/v1/places/reverse`.
      enum: [nlp, user_edit, place_search, map_pin]
    SignalLocation:
      type: object
      description: |
        Mirrors `Hali.Contracts.Signals.SignalLocationDto`. Resolved location
        descriptors and a confidence score.
      required:
        [areaName, roadName, junctionName, landmarkName, facilityName,
         locationLabel, locationPrecisionType, locationConfidence, locationSource]
      properties:
        areaName: { type: string, nullable: true }
        roadName: { type: string, nullable: true }
        junctionName: { type: string, nullable: true }
        landmarkName: { type: string, nullable: true }
        facilityName: { type: string, nullable: true }
        locationLabel: { type: string, nullable: true }
        locationPrecisionType: { type: string, nullable: true }
        locationConfidence: { type: number, minimum: 0, maximum: 1 }
        locationSource: { $ref: '#/components/schemas/LocationSource' }
    SignalPreviewResponse:
      type: object
      description: |
        Single extraction result. Mirrors `SignalPreviewResponseDto`. The
        previously-documented `candidates[]` and `existingClusterCandidates[]`
        arrays do NOT exist in the backend.

        `requiresLocationFallback` (C11) is the server-authoritative flag
        indicating the NLP-extracted location is too weak to submit as-is;
        the composer routes the user into the place-search / current-location
        picker when it is true. See `LocationFallbackPolicy` in the backend.
      required:
        [category, subcategorySlug, conditionSlug, conditionConfidence, location,
         temporalType, neutralSummary, shouldSuggestJoin, requiresLocationFallback]
      properties:
        category: { $ref: '#/components/schemas/CivicCategory' }
        subcategorySlug: { type: string }
        conditionSlug: { type: string, nullable: true }
        conditionConfidence: { type: number, minimum: 0, maximum: 1 }
        location: { $ref: '#/components/schemas/SignalLocation' }
        temporalType: { type: string, nullable: true }
        neutralSummary: { type: string, nullable: true }
        shouldSuggestJoin: { type: boolean }
        requiresLocationFallback:
          type: boolean
          description: |
            True when the composer MUST route the user into the low-confidence
            location fallback picker before allowing submit. Triggered when
            `location.locationConfidence < 0.5` OR `location.locationLabel`
            is blank.
    SignalSubmitRequest:
      type: object
      description: |
        Flat shape — no nested `candidate` wrapper. `spatialCellId` is derived
        server-side from lat/lng and must NOT be sent by the client.

        When `locationSource` is `place_search`, `locationLabel` is required
        (non-blank). The server rejects unknown `locationSource` values with
        `validation.invalid_location_source`.
      required:
        [idempotencyKey, deviceHash, freeText, category, subcategorySlug,
         conditionConfidence, latitude, longitude, locationConfidence, locationSource]
      properties:
        idempotencyKey: { type: string }
        deviceHash: { type: string }
        freeText: { type: string }
        category: { $ref: '#/components/schemas/CivicCategory' }
        subcategorySlug: { type: string }
        conditionSlug: { type: string, nullable: true }
        conditionConfidence: { type: number, minimum: 0, maximum: 1 }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        locationLabel: { type: string, nullable: true }
        locationPrecisionType: { type: string, nullable: true }
        locationConfidence: { type: number, minimum: 0, maximum: 1 }
        locationSource: { $ref: '#/components/schemas/LocationSource' }
        temporalType: { type: string, nullable: true }
        neutralSummary: { type: string, nullable: true }
        sourceLanguage: { type: string, nullable: true }
    PlaceCandidate:
      type: object
      description: |
        A single geocoding candidate returned by the C11 places endpoints.
        Mirrors `Hali.Contracts.Signals.PlaceCandidateDto`. Every candidate
        is resolved to a Hali locality (otherwise filtered out by the
        backend); the composer uses this to supply authoritative submit
        coordinates and label.
      required:
        [displayName, latitude, longitude, localityId, wardName, cityName]
      properties:
        displayName: { type: string }
        latitude: { type: number, format: double, minimum: -90, maximum: 90 }
        longitude: { type: number, format: double, minimum: -180, maximum: 180 }
        localityId: { type: string, format: uuid, nullable: true }
        wardName: { type: string, nullable: true }
        cityName: { type: string, nullable: true }
    SignalSubmitResponse:
      type: object
      required: [signalEventId, clusterId, isNewCluster, clusterState, localityId, createdAt]
      properties:
        signalEventId: { type: string, format: uuid }
        clusterId: { type: string, format: uuid }
        isNewCluster: { type: boolean }
        clusterState: { type: string, enum: [unconfirmed, active, possible_restoration, resolved] }
        localityId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }

    # ── Clusters / Participation ─────────────────────────────────────
    ClusterResponse:
      type: object
      description: |
        Mirrors `Hali.Contracts.Clusters.ClusterResponseDto`. CIVIS internals
        (civis_score, wrab, sds, macf, raw_confirmation_count, account_id,
        device_id) are intentionally NOT present.
      required:
        [id, state, category, subcategorySlug, title, summary, locationLabel,
         affectedCount, observingCount, createdAt, updatedAt,
         activatedAt, possibleRestorationAt, resolvedAt, officialPosts, myParticipation]
      properties:
        id: { type: string, format: uuid }
        state:
          type: string
          enum: [unconfirmed, active, possible_restoration, resolved]
        category: { $ref: '#/components/schemas/CivicCategory' }
        subcategorySlug: { type: string, nullable: true }
        title: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        locationLabel:
          type: string
          nullable: true
          description: >
            Canonical human-readable location label for the cluster, e.g.
            "Ngong Road near Adams Arcade, Kilimani". Null when the
            originating signal did not include a resolved location label.
        affectedCount: { type: integer }
        observingCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        activatedAt: { type: string, format: date-time, nullable: true }
        possibleRestorationAt: { type: string, format: date-time, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
        officialPosts:
          type: array
          items: { $ref: '#/components/schemas/OfficialPostResponse' }
        myParticipation:
          oneOf:
            - $ref: '#/components/schemas/MyParticipation'
            - type: 'null'
          description: |
            Per-caller participation snapshot. Null for unauthenticated callers
            or callers with no participation row on this cluster. Used by the
            mobile UI to gate the "Add Further Context" and restoration-response
            CTAs server-side. The same gating is also enforced at the trust
            boundary in POST /v1/clusters/{id}/context and
            POST /v1/clusters/{id}/restoration-response.
        restorationRatio:
          type: number
          format: double
          nullable: true
          minimum: 0
          maximum: 1
          description: |
            Fraction of restoration responses that voted 'yes'. Populated only when
            state == possible_restoration (null otherwise, and null when no restoration
            responses have been recorded yet). Equal to restorationYesVotes divided by
            restorationTotalVotes. Exposed as a pre-computed server value — mobile must
            not derive it from other fields.
        restorationYesVotes:
          type: integer
          nullable: true
          description: |
            Count of 'restoration_yes' votes on this cluster. Populated only when
            state == possible_restoration. Aggregate count only — no individual
            vote attribution.
        restorationTotalVotes:
          type: integer
          nullable: true
          description: |
            Total count of restoration responses on this cluster (participation
            types restoration_yes + restoration_no + restoration_unsure).
            Populated only when state == possible_restoration. Aggregate count
            only.
        responseStatus:
          type: string
          nullable: true
          enum:
            - acknowledged
            - teams_dispatched
            - teams_on_site
            - work_ongoing
            - restoration_in_progress
            - service_restored
          description: |
            Additive nullable field. Derived server-side from the most recent
            `live_update` official post on the cluster. Null when no
            live_update has declared a status yet. Powers the institution
            Signal Detail header and the citizen-visible response indicator.
    MyParticipation:
      type: object
      description: |
        Mirrors `Hali.Contracts.Clusters.MyParticipationDto`. Server's verdict
        on what the calling user may currently do on this cluster.
      required: [type, createdAt, canAddContext, canRespondToRestoration]
      properties:
        type:
          type: string
          enum:
            [affected, observing, no_longer_affected,
             restoration_yes, restoration_no, restoration_unsure]
        createdAt: { type: string, format: date-time }
        canAddContext:
          type: boolean
          description: |
            True iff type=affected AND now is within ContextEditWindowMinutes
            (default 2) of createdAt. Mobile must gate "Add Further Context"
            on this flag — local timing alone is not sufficient.
        canRespondToRestoration:
          type: boolean
          description: |
            True iff type=affected. Mobile must only show the restoration
            response CTA when this is true.
    ParticipationRequest:
      type: object
      description: |
        Mirrors `ParticipationRequestDto`. `type` accepts only the three core
        participation values. Restoration votes use the dedicated endpoint
        `POST /v1/clusters/{id}/restoration-response`.
      required: [type, deviceHash]
      properties:
        type:
          type: string
          enum: [affected, observing, no_longer_affected]
        deviceHash: { type: string }
        idempotencyKey: { type: string, nullable: true }
    ContextRequest:
      type: object
      required: [text, deviceHash]
      properties:
        text: { type: string }
        deviceHash: { type: string }
    RestorationResponseRequest:
      type: object
      description: |
        Mirrors `RestorationResponseRequestDto`. Field is `response`, not
        `type`, and the accepted values are domain terms, not `restoration_*`.
      required: [response, deviceHash]
      properties:
        response:
          type: string
          enum: [still_affected, restored, not_sure]
        deviceHash: { type: string }

    # ── Official Posts ───────────────────────────────────────────────
    OfficialPostCreateRequest:
      type: object
      description: |
        Mirrors `CreateOfficialPostRequestDto`. The geo-scope is passed as
        the flat fields `localityId` / `corridorName` — there is no `scopes[]`
        array on the backend.
      required: [type, category, title, body]
      properties:
        type:
          type: string
          enum: [live_update, scheduled_disruption, advisory_public_notice]
        category: { $ref: '#/components/schemas/CivicCategory' }
        title: { type: string, maxLength: 220 }
        body: { type: string, maxLength: 5000 }
        startsAt: { type: string, format: date-time, nullable: true }
        endsAt: { type: string, format: date-time, nullable: true }
        relatedClusterId: { type: string, format: uuid, nullable: true }
        isRestorationClaim: { type: boolean, default: false }
        localityId: { type: string, format: uuid, nullable: true }
        corridorName: { type: string, nullable: true }
        responseStatus:
          type: string
          nullable: true
          enum:
            - acknowledged
            - teams_dispatched
            - teams_on_site
            - work_ongoing
            - restoration_in_progress
            - service_restored
          description: |
            Optional response status for `live_update` posts. Rejected with
            `official_post.invalid_response_status` when supplied on any
            non-live_update post, or when the value is outside the canonical
            set. Null for other post types.
        severity:
          type: string
          nullable: true
          enum: [minor, moderate, major]
          description: |
            Optional severity for `scheduled_disruption` posts. Rejected with
            `official_post.invalid_severity` when supplied on any non-scheduled
            post, or when the value is outside the canonical set.
    OfficialPostResponse:
      type: object
      required:
        [id, institutionId, type, category, title, body, startsAt, endsAt,
         status, relatedClusterId, isRestorationClaim, createdAt]
      properties:
        id: { type: string, format: uuid }
        institutionId: { type: string, format: uuid }
        type: { type: string }
        category: { $ref: '#/components/schemas/CivicCategory' }
        title: { type: string }
        body: { type: string }
        startsAt: { type: string, format: date-time, nullable: true }
        endsAt: { type: string, format: date-time, nullable: true }
        status: { type: string }
        relatedClusterId: { type: string, format: uuid, nullable: true }
        isRestorationClaim: { type: boolean }
        createdAt: { type: string, format: date-time }
        responseStatus:
          type: string
          nullable: true
          enum:
            - acknowledged
            - teams_dispatched
            - teams_on_site
            - work_ongoing
            - restoration_in_progress
            - service_restored
          description: |
            Response status for `live_update` posts. Null for other post types.
        severity:
          type: string
          nullable: true
          enum: [minor, moderate, major]
          description: |
            Severity for `scheduled_disruption` posts. Null for other post types.

    # ── Institution (Phase 2) ────────────────────────────────────────
    InstitutionArea:
      type: object
      description: |
        Summary of one area (institution jurisdiction row) — display name,
        active-signal count, top-category, last updated timestamp.
      required: [id, name, condition, activeSignals, topCategory, lastUpdatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        condition:
          type: string
          enum: [active, elevated, calm]
        activeSignals: { type: integer }
        topCategory:
          type: string
          nullable: true
          description: |
            Snake-case category slug of the modal civic category in this area
            across active clusters. Null when the area has no active clusters.
        lastUpdatedAt:
          type: string
          format: date-time
          nullable: true
          description: Newest `last_seen_at` across active clusters in this area.
    InstitutionAreaRef:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    InstitutionOverviewSummary:
      type: object
      required:
        [activeSignals, growingSignals, updatesPostedToday, stabilisedToday]
      properties:
        activeSignals: { type: integer }
        growingSignals: { type: integer }
        updatesPostedToday: { type: integer }
        stabilisedToday: { type: integer }
    InstitutionOverviewResponse:
      type: object
      description: |
        Overview page payload. Activity is served separately from
        `GET /v1/institution/activity` so the two caches can rotate
        independently.
      required: [summary, areas]
      properties:
        summary: { $ref: '#/components/schemas/InstitutionOverviewSummary' }
        areas:
          type: array
          maxItems: 6
          items: { $ref: '#/components/schemas/InstitutionArea' }
    InstitutionSignalListItem:
      type: object
      required:
        [id, title, area, category, condition, trend, responseStatus,
         affectedCount, recentReports24h, timeActiveSeconds]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        area:
          oneOf:
            - $ref: '#/components/schemas/InstitutionAreaRef'
            - type: 'null'
        category: { $ref: '#/components/schemas/CivicCategory' }
        condition:
          type: string
          enum: [active, elevated, calm]
        trend:
          type: string
          enum: [growing, stable, slowing, possible_restoration]
        responseStatus:
          type: string
          nullable: true
          enum:
            - acknowledged
            - teams_dispatched
            - teams_on_site
            - work_ongoing
            - restoration_in_progress
            - service_restored
        affectedCount: { type: integer }
        recentReports24h: { type: integer }
        timeActiveSeconds: { type: integer, format: int64 }
    InstitutionSignalsResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InstitutionSignalListItem' }
        nextCursor:
          type: string
          nullable: true
          description: |
            Opaque cursor. Null when the current page is the final page.
            Callers pass the value back as the `cursor` query parameter to
            fetch the next page.
    InstitutionAreasResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InstitutionArea' }
    InstitutionActivityItem:
      type: object
      required: [id, type, message, timestamp, signalId]
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          enum:
            - new_signal
            - growing
            - stabilising
            - update_posted
            - restoration
            - restored
        message: { type: string }
        timestamp: { type: string, format: date-time }
        signalId: { type: string, format: uuid, nullable: true }
    InstitutionActivityResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InstitutionActivityItem' }
        nextCursor: { type: string, nullable: true }

    InstitutionRestorationQueueItem:
      type: object
      required:
        - clusterId
        - title
        - category
        - possibleRestorationAt
        - restorationYes
        - stillAffected
        - totalRestorationResponses
      properties:
        clusterId: { type: string, format: uuid }
        title: { type: string }
        category:
          type: string
          description: Civic category slug (e.g. `water`, `roads`).
        localityId:
          type: string
          format: uuid
          nullable: true
          description: Jurisdiction the cluster maps to, if any.
        localityName:
          type: string
          nullable: true
          description: Display name of the jurisdiction the cluster maps to.
        possibleRestorationAt:
          type: string
          format: date-time
          description: When the cluster entered possible_restoration state.
        restorationYes:
          type: integer
          minimum: 0
          description: Count of `restoration_yes` votes recorded on the cluster.
        stillAffected:
          type: integer
          minimum: 0
          description: Count of `restoration_no` (still-affected) votes recorded on the cluster.
        totalRestorationResponses:
          type: integer
          minimum: 0
          description: |
            Total restoration responses recorded (yes + no + unsure).
            Matches the denominator the lifecycle engine uses to compute
            the ratio.
        restorationRatio:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
          description: |
            Current ratio of `restoration_yes` votes over
            `totalRestorationResponses`. Null when no responses have
            been recorded yet (the engine requires at least two before
            it will evaluate the ratio).
    InstitutionRestorationQueueResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/InstitutionRestorationQueueItem'

    # ── Users ────────────────────────────────────────────────────────
    NotificationSettings:
      type: object
      properties:
        clusterActivated: { type: boolean }
        restorationPrompt: { type: boolean }
        clusterResolved: { type: boolean }
    UserMeResponse:
      type: object
      required: [id, displayName, phoneE164, email, status, createdAt, notificationSettings]
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string, nullable: true }
        phoneE164: { type: string, nullable: true }
        email: { type: string, nullable: true }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        notificationSettings:
          $ref: '#/components/schemas/NotificationSettings'

    # ── Home Feed ────────────────────────────────────────────────────
    ClusterPagedSection:
      type: object
      description: Paginated section containing ClusterResponse items.
      required: [items, nextCursor, totalCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClusterResponse'
        nextCursor:
          type: string
          nullable: true
          description: Opaque base64-encoded cursor; null means no more pages
        totalCount:
          type: integer
    OfficialPostPagedSection:
      type: object
      description: Paginated section containing OfficialPostResponse items.
      required: [items, nextCursor, totalCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OfficialPostResponse'
        nextCursor:
          type: string
          nullable: true
          description: Opaque base64-encoded cursor; null means no more pages
        totalCount:
          type: integer
    HomeResponse:
      type: object
      required: [activeNow, officialUpdates, recurringAtThisTime, otherActiveSignals]
      properties:
        activeNow:
          allOf:
            - $ref: '#/components/schemas/ClusterPagedSection'
          description: Non-recurring active clusters in followed localities (max 20)
        officialUpdates:
          allOf:
            - $ref: '#/components/schemas/OfficialPostPagedSection'
          description: Official posts for followed localities (max 5)
        recurringAtThisTime:
          allOf:
            - $ref: '#/components/schemas/ClusterPagedSection'
          description: Recurring clusters in followed localities (max 10)
        otherActiveSignals:
          allOf:
            - $ref: '#/components/schemas/ClusterPagedSection'
          description: Active clusters outside followed localities (max 10)

    # ── Institution Auth (Phase 2) ────────────────────────────────────
    MagicLinkRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 254 }
    MagicLinkRequestResponse:
      type: object
      required: [message, expiresAt]
      properties:
        message: { type: string }
        expiresAt: { type: string, format: date-time }
    MagicLinkVerifyRequest:
      type: object
      required: [token]
      properties:
        token: { type: string, maxLength: 256 }
    MagicLinkVerifyResponse:
      type: object
      required: [requiresTotpEnrollment, requiresTotpVerification, session]
      properties:
        requiresTotpEnrollment:
          type: boolean
          description: |
            True when the account has no confirmed TOTP enrollment. The
            client must complete enroll + confirm before the session is
            treated as fully authenticated.
        requiresTotpVerification:
          type: boolean
          description: |
            True when the account has a confirmed TOTP enrollment but the
            current session has not yet stamped step_up_verified_at. The
            client must call /totp/verify before privileged actions.
        session: { $ref: '#/components/schemas/SessionEstablishedResponse' }
    SessionEstablishedResponse:
      type: object
      required: [createdAt, absoluteExpiresAt, softWarningSeconds, idleTimeoutSeconds]
      properties:
        createdAt: { type: string, format: date-time }
        absoluteExpiresAt: { type: string, format: date-time }
        softWarningSeconds: { type: integer }
        idleTimeoutSeconds: { type: integer }
    SessionRefreshedResponse:
      type: object
      required: [lastActivityAt, softWarningSeconds, idleTimeoutSeconds]
      properties:
        lastActivityAt: { type: string, format: date-time }
        softWarningSeconds: { type: integer }
        idleTimeoutSeconds: { type: integer }
    TotpCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^\d{6}$'
    TotpEnrollResponse:
      type: object
      required: [otpAuthUri, recoveryCodes]
      properties:
        otpAuthUri:
          type: string
          description: |
            otpauth:// URI an authenticator app consumes to seed the
            TOTP secret. Clients typically render this as a QR code.
        recoveryCodes:
          type: array
          items: { type: string }
          description: |
            Single-use recovery codes. Shown to the user exactly once at
            enrollment time — the server stores only SHA-256 hashes.
    StepUpResponse:
      type: object
      required: [verifiedAt, windowSeconds]
      properties:
        verifiedAt: { type: string, format: date-time }
        windowSeconds:
          type: integer
          description: |
            Seconds during which the step-up verification remains fresh.
            Privileged endpoints reject requests whose verifiedAt is
            older than this window.

    # ── Institution Admin (Phase 2) ───────────────────────────────────
    InviteInstitutionUserRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        role:
          type: string
          enum: [institution_user, institution_admin]
          description: |
            `institution_admin` is rejected today with
            `institution_admin.elevation_requires_approval`; supply
            `institution_user` and promote later once the approval flow
            lands.
    InviteInstitutionUserResponse:
      type: object
      required: [inviteId, expiresAt]
      properties:
        inviteId: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
    ChangeUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [institution_user, institution_admin]
          description: |
            Only `institution_user` (demotion) is allowed today.
            `institution_admin` returns
            `institution_admin.elevation_requires_approval`.
    InstitutionAdminUserListItem:
      type: object
      required: [id, email, displayName, role, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, nullable: true }
        displayName: { type: string, nullable: true }
        role:
          type: string
          enum: [institution_user, institution_admin]
        createdAt: { type: string, format: date-time }
    InstitutionAdminUserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InstitutionAdminUserListItem' }
    InstitutionAdminUserDetailResponse:
      type: object
      required: [id, email, displayName, role, status, isBlocked, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, nullable: true }
        displayName: { type: string, nullable: true }
        role:
          type: string
          enum: [institution_user, institution_admin]
        status: { type: string }
        isBlocked: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    InstitutionAdminScopeJurisdiction:
      type: object
      required: [id, localityId, corridorName, displayName]
      properties:
        id: { type: string, format: uuid }
        localityId: { type: string, format: uuid, nullable: true }
        corridorName: { type: string, nullable: true }
        displayName: { type: string, nullable: true }
    InstitutionAdminScopeResponse:
      type: object
      required: [institutionId, institutionName, jurisdictions]
      properties:
        institutionId: { type: string, format: uuid }
        institutionName: { type: string }
        jurisdictions:
          type: array
          items: { $ref: '#/components/schemas/InstitutionAdminScopeJurisdiction' }
