version: "3.9"
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: hali
      POSTGRES_USER: hali
      POSTGRES_PASSWORD: hali_dev_password
    ports:
      - "5432:5432"
    volumes:
      - hali-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--save", "60", "1"]
    ports:
      - "6379:6379"

volumes:
  hali-pgdata:
